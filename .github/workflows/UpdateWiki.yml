name: Update Wiki Submodule

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:  # Allows manual triggering

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Skip code submodules: the private external/SR-lib can't be cloned
          # with the default GITHUB_TOKEN and would fail checkout. Only the
          # wiki submodule is needed here; it's init'd explicitly below.
          submodules: false

      - name: Configure Git Identity
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Update Wiki Submodule
        id: wiki
        run: |
          git submodule update --init --remote wiki || true
          cd wiki
          git fetch origin
          git merge origin/master --allow-unrelated-histories || true
          cd ..
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Changes detected, committing..."
            git add wiki
            git commit -m "Automated update of wiki submodule"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes detected, skipping commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # This job's push uses GITHUB_TOKEN, which won't trigger on:push
      # workflows. Explicitly dispatch the Pages rebuild (workflow_dispatch
      # works with GITHUB_TOKEN) so the docs site picks up the new wiki
      # content, without kicking off a full driver Build.
      - name: Trigger Pages rebuild
        if: steps.wiki.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref "${{ github.ref_name }}"
